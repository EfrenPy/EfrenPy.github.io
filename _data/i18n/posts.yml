# Blog posts translations

# Post: New Horizons at CERN (2024-10)
new_horizons_title:
  en: "New Horizons in Particle Physics: My Role at CERN with the VELO Group"
  es: "Nuevos Horizontes en Física de Partículas: Mi Rol en el CERN con el Grupo VELO"

new_horizons_intro:
  en: "**Starting a new role with CERN's VELO Group**"
  es: "**Nuevo puesto en el Grupo VELO del CERN**"

new_horizons_text:
  en: |
    As of October, I've officially started a new chapter in my career as part of the VELO (Vertex Locator) group at CERN, where I'll be contributing to the group's research and technologies. The VELO detector is a key component of the LHCb experiment, and I'll be working on advancing its performance and capabilities.

    My current work focuses on several projects, including the **simulation of 3D column silicon sensors** for the VELO, the **development of the Timepix4 telescope**, and creating **new testing techniques for high-energy physics sensors**. These projects combine particle physics, sensor technology, and data analysis, and they aim to advance our understanding of fundamental physics.

    The Timepix4 telescope is one of the highlights of my work. It uses an 8-plane configuration with Timepix4 ASICs (448×512 pixels, 55 μm pitch, 195 ps TDC binning) to achieve **92 ps track timing** and **2.3 μm pointing resolution**, the only beam telescope combining both capabilities at this level. Leading test beam campaigns at the SPS, overseeing construction, and coordinating teams across institutions are some of the responsibilities I'm taking on. I'm also working on refining **data analysis techniques** using the LGADUtils framework to improve the output of experiments at CERN.

    Joining the VELO group has been a big challenge. The work involves complex simulations, new ideas, and collaboration with researchers across CERN and the global physics community. I'm looking forward to what comes next, both in the physics results and the technology development.
  es: |
    Desde octubre, he comenzado oficialmente un nuevo capítulo en mi carrera como parte del grupo VELO (Vertex Locator) en el CERN, donde contribuiré a la investigación y al desarrollo tecnológico del grupo. El detector VELO es un componente clave del experimento LHCb, y trabajaré en mejorar su rendimiento y capacidades.

    Mi trabajo actual se centra en varios proyectos, incluyendo la **simulación de sensores de silicio 3D columnares** para el VELO, el **desarrollo del telescopio Timepix4**, y la creación de **nuevas técnicas de prueba para sensores de física de altas energías**. Estos proyectos combinan la física de partículas, la tecnología de sensores y el análisis de datos, y buscan avanzar en nuestra comprensión de la física fundamental.

    El telescopio Timepix4 es uno de los aspectos más destacados de mi trabajo. Utiliza una configuración de 8 planos con ASICs Timepix4 (448×512 píxeles, 55 μm de paso, 195 ps de resolución TDC) para alcanzar **92 ps de resolución temporal en traza** y **2,3 μm de resolución de apuntado**, el único telescopio de haz que combina ambas capacidades a este nivel. Liderar campañas de haces de prueba en el SPS, supervisar la construcción y coordinar equipos entre instituciones son algunas de las responsabilidades que asumo. También estoy refinando **técnicas de análisis de datos** mediante el framework LGADUtils para mejorar los resultados de los experimentos en el CERN.

    Unirme al grupo VELO ha sido un gran reto. El trabajo implica simulaciones complejas, nuevas ideas y colaboración con investigadores del CERN y la comunidad física global. Con ganas de ver lo que viene, tanto en los resultados de física como en el desarrollo tecnológico.

# Post: VELO Detector Launch (2023-06)
velo_launch_title:
  en: "The VELO Goes Live: Our Detector Joins LHC Run 3"
  es: "El VELO Arranca: Nuestro Detector se Suma al Run 3 del LHC"

velo_launch_question:
  en: "**Why is there more matter than antimatter in the universe?**"
  es: "**¿Por qué hay más materia que antimateria en el universo?**"

velo_launch_text:
  en: |
    Working on some of the biggest open questions in physics, our researchers from the Instituto Galego de Física de Altas Enerxías (IGFAE), including Edgar Lemos Cid, Antonio Fernández Prieto, and Efrén Rodríguez Rodríguez, travelled to CERN. Their objective: to install and commission the new VELO detector for the LHCb experiment, a major step for the project.

    This Tuesday, July 5th, the VELO detector goes live with the start of #LHCRun3 at the Large Hadron Collider (LHC) after years of upgrades. The detector comprises 52 modules with 624 VeloPix ASICs and 41 million pixels, approaching within 5.1 mm of the LHC beam. A result of IGFAE's work since 2008, it represents years of R&D in particle physics. Designed to measure b mesons with high precision, it is a key tool for exploring physics beyond the Standard Model.

    The IGFAE's involvement in the design and development of the VELO subdetector sensors reflects over a decade of work in the field. With the detector now taking collision data, the team's years of effort are paying off.

    This is a major step forward for the experiment, and for the international collaboration that made it possible.
  es: |
    Trabajando en algunas de las grandes preguntas abiertas de la física, nuestros investigadores del Instituto Galego de Física de Altas Enerxías (IGFAE), incluyendo a Edgar Lemos Cid, Antonio Fernández Prieto y Efrén Rodríguez Rodríguez, viajaron al CERN. Su objetivo: instalar y poner en marcha el nuevo detector VELO para el experimento LHCb, un paso importante para el proyecto.

    Este martes 5 de julio el detector VELO entra en funcionamiento con el comienzo del #LHCRun3 en el Gran Colisionador de Hadrones (LHC) tras años de mejoras. El detector consta de 52 módulos con 624 ASICs VeloPix y 41 millones de píxeles, acercándose a 5,1 mm del haz del LHC. Resultado del trabajo del IGFAE desde 2008, representa años de I+D en física de partículas. Diseñado para medir mesones b con alta precisión, es una herramienta clave para explorar la física más allá del Modelo Estándar.

    La participación del IGFAE en el diseño y desarrollo de los sensores del subdetector VELO refleja más de una década de trabajo en el campo. Con el detector tomando ahora datos de colisiones, los años de esfuerzo del equipo están dando sus frutos.

    Este es un paso importante para el experimento y para la colaboración internacional que lo hizo posible.

# Post: Python Certification (2023-11)
python_cert_title:
  en: "Achievement Unlocked: INF-303 Python IT Specialist Certification"
  es: "Logro Desbloqueado: Certificación INF-303 Python IT Specialist"

python_cert_text:
  en: |
    **Achievement Unlocked!**

    I'm happy to share that I've earned a new certification. I have successfully passed the INF-303: Python IT Specialist certification, a step forward in formalising my Python skills.

    This certification validates my proficiency in Python and my ability to use it to solve problems, automate tasks, and build solutions in information technology.

    Getting here involved plenty of learning and practice, going back to fundamentals that I'd picked up piecemeal during my physics research over the years.

    I'm looking forward to applying these more solid foundations to future projects and challenges.
  es: |
    **¡Logro Desbloqueado!**

    Me alegra compartir que he obtenido una nueva certificación. He aprobado con éxito la certificación INF-303: Python IT Specialist, un paso adelante para formalizar mis habilidades en Python.

    Esta certificación valida mi competencia en Python y mi capacidad para usarlo para resolver problemas, automatizar tareas y desarrollar soluciones en tecnología de la información.

    Llegar aquí implicó mucho aprendizaje y práctica, volviendo a fundamentos que había ido aprendiendo sobre la marcha durante años de investigación en física.

    Tengo ganas de aplicar estos cimientos más sólidos a futuros proyectos y retos.

# Post: Hiroshima Symposium (2023-12)
hiroshima_title:
  en: "Presenting the VELO at HSTD13 in Vancouver"
  es: "Presentando el VELO en el HSTD13 en Vancouver"

hiroshima_text:
  en: |
    **Presenting the VELO at the Hiroshima Symposium**

    I presented at the "Hiroshima" Symposium on the Development and Application of Semiconductor Tracking Detectors, held in Vancouver, Canada.

    The focus of my presentation was the LHCb VELO detector: 52 modules, 41 million pixels, operating just 5.1 mm from the LHC beam. The detector delivers the impact parameter resolution and tracking performance needed for the high-luminosity conditions at the LHC.

    My talk covered the detector's design, commissioning results (including threshold equalization, noise performance, and hit efficiency), and early tracking performance in Run 3.

    The symposium was a good opportunity to share our results and exchange ideas with other groups working on semiconductor tracking detectors.
  es: |
    **Presentando el VELO en el Simposio de Hiroshima**

    Presenté en el Simposio "Hiroshima" sobre Desarrollo y Aplicación de Detectores de Seguimiento de Semiconductores, celebrado en Vancouver, Canadá.

    Mi presentación se centró en el detector LHCb VELO: 52 módulos, 41 millones de píxeles, operando a solo 5,1 mm del haz del LHC. El detector VELO ofrece la resolución de parámetro de impacto y la capacidad de seguimiento que exigen las condiciones de alta luminosidad del LHC.

    En mi charla presenté el diseño del detector, los resultados de puesta en marcha (incluyendo ecualización de umbrales, rendimiento de ruido y eficiencia de impacto), y los primeros resultados de tracking del Run 3.

    El simposio fue una buena oportunidad para compartir nuestros resultados e intercambiar ideas con otros grupos que trabajan en detectores de seguimiento de semiconductores.

# Post: Grid Usage Nikhef (2024-05)
grid_title:
  en: "I Think I Broke the Grid: 3rd Place in Grid Usage at Nikhef!"
  es: "¡Creo que Rompí el Grid: 3er Puesto en Uso del Grid en Nikhef!"

grid_text:
  en: |
    **185,849 grid jobs and counting**

    Guess who's been keeping the grid busy?

    That's right, I managed to snag the 3rd place in grid usage at Nikhef for my timing analysis of the Timepix4 telescope! All those jobs were processing data from multiple SPS test beam campaigns, running per-pixel calibrations, timewalk corrections, and track reconstruction to extract the telescope's 92 ps timing resolution.

    With over 185,849 jobs, I might have given the grid a bit of a workout. Maybe it's time to get it a gym membership?

    Big shoutout to my amazing team and colleagues for all the support and fun along the way. Here's to more data crunching and less grid hogging in the future!
  es: |
    **185.849 trabajos en el grid y sumando**

    ¿Adivina quién ha mantenido el grid ocupado?

    ¡Así es, conseguí el 3er puesto en uso del grid en Nikhef por mi análisis temporal del telescopio Timepix4! Todos esos trabajos procesaban datos de múltiples campañas de haz en el SPS, ejecutando calibraciones píxel a píxel, correcciones de timewalk y reconstrucción de trazas para extraer la resolución temporal de 92 ps del telescopio.

    Con más de 185.849 trabajos, puede que le haya dado al grid un buen entrenamiento. ¿Quizás es hora de conseguirle una membresía de gimnasio?

    Un gran saludo a mi increíble equipo y colegas por todo el apoyo y diversión en el camino. ¡Por más procesamiento de datos y menos acaparamiento del grid en el futuro!

# Post: Pisa Conference (2022-06)
pisa_title:
  en: "Talk and Poster at the Pisa Meeting on Advanced Detectors"
  es: "Charla y Póster en el Pisa Meeting sobre Detectores Avanzados"

pisa_text:
  en: |
    **At the edge of Particle Physics Detectors at the "Pisa Meeting"**

    Last week I presented a talk and a poster at the 15th Pisa Meeting on Advanced Detectors, a major conference for detector R&D in particle physics. Both presentations covered the upcoming upgrade of the LHCb Vertex Locator (VELO) at CERN, a project I am deeply involved in, specifically the sensors and electronics I've been developing.

    The conference brought together experts in detectors and electronics for high-energy physics. It was a good opportunity to discuss the challenges and ongoing work shaping detector R&D.

    The LHCb VELO upgrade aims to handle the high-luminosity conditions at the LHC while improving measurement precision. My work focused on the high-speed data transmission system (8 channels at 5 Gbps each, 40 Gbps total) and high-voltage cabling rated for 1000V, balancing signal integrity against the radiation and space constraints inside the detector.

    Talking with fellow researchers, sharing results, and getting feedback was one of the most valuable parts of the conference.
  es: |
    **En la vanguardia de los Detectores de Física de Partículas en el "Pisa Meeting"**

    La semana pasada presenté una charla y un póster en el 15.º Pisa Meeting on Advanced Detectors, una conferencia importante de I+D en detectores para física de partículas. Ambas trataban sobre la próxima actualización del Localizador de Vértices (VELO) del LHCb en el CERN, un proyecto en el que estoy profundamente involucrado, concretamente los sensores y la electrónica que he estado desarrollando.

    La conferencia reunió a expertos en detectores y electrónica para física de altas energías. Fue una buena oportunidad para discutir los desafíos y el trabajo en curso en I+D de detectores.

    La actualización del LHCb VELO busca hacer frente a las condiciones de alta luminosidad del LHC mientras mejora la precisión de las mediciones. Mi trabajo se centró en el sistema de transmisión de datos de alta velocidad (8 canales a 5 Gbps cada uno, 40 Gbps en total) y cableado de alto voltaje de 1000V, equilibrando la integridad de señal frente a las restricciones de radiación y espacio dentro del detector.

    Hablar con otros investigadores, compartir resultados y recibir comentarios fue una de las partes más valiosas de la conferencia.

# Post: Generative AI Workshop (2023-12)
genai_title:
  en: "Generative AI for Dummies"
  es: "IA Generativa para Principiantes"

genai_text:
  en: |
    **A hands-on AI workshop for researchers**

    In a recent workshop titled "Generative AI for Dummies," which I co-ran with my colleague Víctor López Pardo, we set out to give researchers a practical introduction to Generative AI. Our attendees ranged from Ph.D. students to experienced researchers, all wanting to understand what these tools can do for their work.

    Generative AI can create new data and text, and has real potential for research workflows. During the workshop, we focused on practical applications: how these tools can help with research tasks day to day. Participants got hands-on experience with tools like ChatGPT, testing what works and what doesn't for their specific needs.

    The workshop led to good discussions about where AI tools help and where they fall short. The feedback showed real interest in using these tools for research, but also healthy scepticism about their limitations.

    If your team or department is interested in a similar session, I'd be happy to put one together.
  es: |
    **Un taller práctico de IA para investigadores**

    En un taller reciente titulado "IA Generativa para Principiantes", que co-dirigí con mi colega Víctor López Pardo, nos propusimos dar a los investigadores una introducción práctica a la IA Generativa. Nuestros asistentes iban desde estudiantes de doctorado hasta investigadores experimentados, todos queriendo entender qué pueden hacer estas herramientas en su trabajo.

    La IA Generativa puede crear datos y texto nuevos, y tiene potencial real para los flujos de trabajo de investigación. Durante el taller, nos centramos en aplicaciones prácticas: cómo estas herramientas pueden ayudar con tareas de investigación en el día a día. Los participantes tuvieron experiencia práctica con herramientas como ChatGPT, probando qué funciona y qué no para sus necesidades específicas.

    El taller generó buenas discusiones sobre dónde ayudan las herramientas de IA y dónde se quedan cortas. Los comentarios mostraron interés real en usar estas herramientas para investigación, pero también un escepticismo sano sobre sus limitaciones.

    Si tu equipo o departamento está interesado en una sesión similar, encantado de preparar una.
