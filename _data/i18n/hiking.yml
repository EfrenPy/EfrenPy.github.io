# Hiking page translations

title:
  en: "Hiking Adventures"
  es: "Aventuras de Senderismo"

intro:
  en: |
    Here I share some of the best views and experiences from my hikes. Each trail tells a story, each summit holds a memory. These are the hikes that challenged me and reminded me why I keep heading back to the mountains.
  es: |
    Aquí comparto algunas de las mejores vistas y experiencias de mis rutas. Cada sendero cuenta una historia, cada cumbre guarda un recuerdo. Estas son las caminatas que me retaron y me recordaron por qué sigo volviendo a la montaña.

schilthorn_title:
  en: "Schilthorn: The Panoramic Peak"
  es: "Schilthorn: La Cumbre Panorámica"

schilthorn_text:
  en: "My ascent to the Schilthorn was stunning. Standing at the summit, I was surrounded by a 360-degree panorama of the Swiss skyline, with views of the Eiger, Mönch, and Jungfrau peaks. Winding through alpine meadows and rocky paths. Reaching Piz Gloria at the top, the sun broke through the clouds, lighting up the surrounding peaks. A tough hike, but worth every step for those views."
  es: "Mi ascenso al Schilthorn fue impresionante. De pie en la cumbre, estaba rodeado por un panorama de 360 grados del horizonte suizo, con vistas de los picos Eiger, Mönch y Jungfrau. Serpenteando por prados alpinos y senderos rocosos. Al llegar a Piz Gloria en la cima, el sol atravesó las nubes, iluminando los picos circundantes. Una subida dura, pero cada paso mereció la pena por esas vistas."

oeschinen_title:
  en: "Oeschinen Lake: Alpine Serenity"
  es: "Lago Oeschinen: Serenidad Alpina"

oeschinen_text:
  en: "Oeschinen Lake was a great find on my hiking trail. The trek to this glacial lake was full of wildflowers and birdsong along the way. As the path opened up, the turquoise waters of Oeschinen Lake appeared, with tall peaks rising behind it. The lake, with its clear water, was a great spot to sit and take it all in. One of the most peaceful places I've found in the mountains."
  es: "El lago Oeschinen fue un gran hallazgo en mi ruta de senderismo. La caminata hasta este lago glacial estaba llena de flores silvestres y canto de pájaros por el camino. A medida que el camino se abría, aparecieron las aguas turquesas del lago Oeschinen, con altos picos alzándose detrás. El lago, con su agua clara, era un sitio perfecto para sentarse y disfrutar del entorno. Uno de los lugares más tranquilos que he encontrado en la montaña."

brig_title:
  en: "Brig: Gateway to Alpine Adventures"
  es: "Brig: Puerta a las Aventuras Alpinas"

brig_text:
  en: "Brig, in the middle of the Valais, was my starting point for several hikes into the surrounding mountains. The town has historic streets and good food, and it's a great base for getting into the Alps. The trails around Brig are varied, offering everything from gentle walks through vineyards to more strenuous climbs up rugged paths. Each hike showed a different side of the Swiss landscape, from green valleys to the snow-capped peaks that define this region."
  es: "Brig, en pleno Valais, fue mi punto de partida para varias rutas por las montañas de alrededor. La ciudad tiene calles con historia y buena comida, y es una base estupenda para meterse en los Alpes. Los senderos alrededor de Brig son variados, desde paseos suaves por viñedos hasta ascensos más exigentes por caminos escarpados. Cada caminata mostraba una cara distinta del paisaje suizo, de valles verdes a cumbres nevadas."

saleve_title:
  en: "Salève: Overlooking Geneva"
  es: "Salève: Con Vistas a Ginebra"

saleve_text:
  en: "Just a stone's throw from Geneva, the Salève offered an easily accessible escape into nature. This mountain, often referred to as Geneva's backyard, provided panoramic views of the city against the backdrop of Lake Geneva and the distant Jura mountains. The ascent was a mix of leisurely walks and steep climbs, leading to the summit where paragliders took flight, adding colour to the sky. A good reminder that the mountains are just minutes from the city."
  es: "A un paso de Ginebra, el Salève es una escapada fácil a la naturaleza. Esta montaña, conocida como el balcón de Ginebra, ofrece vistas panorámicas de la ciudad con el lago Lemán y las montañas del Jura de fondo. El ascenso era una mezcla de paseos tranquilos y subidas empinadas. Un buen recordatorio de que la montaña está a pocos minutos de la ciudad."

eiger_title:
  en: "Eiger: The Iconic North Face"
  es: "Eiger: La Icónica Cara Norte"

eiger_text:
  en: "Approaching the Eiger, its imposing North Face loomed ahead, a reminder of the mountain's history and the climbers who've taken it on. My route skirted the base of this peak, through the landscapes of the Bernese Oberland. The trail meandered through green meadows, past clear streams, always with the Eiger looming above. While I did not attempt the North Face itself, the journey provided an up-close look at one of the most famous mountains in the world, and a lot of respect for the climbers who've taken on the North Face."
  es: "Al acercarme al Eiger, su imponente Cara Norte se alzaba ante mí, un recordatorio de la historia de la montaña y de los escaladores que se han atrevido con ella. Mi ruta bordeaba la base de este pico, a través de los paisajes del Oberland Bernés. El sendero serpenteaba por prados verdes, junto a arroyos claros, siempre con el Eiger asomando por encima. Aunque no intenté la Cara Norte, el recorrido me permitió ver de cerca una de las montañas más famosas del mundo, y mucho respeto por los alpinistas que se han enfrentado a ella."
