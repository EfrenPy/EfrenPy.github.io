# Sports page translations

title:
  en: "Fun-Filled Sports Adventures"
  es: "Deportes y Ocio"

intro:
  en: "I play sports for the fun of it, not the competition. These are some of the activities I enjoy with friends and family:"
  es: "Hago deporte por diversión, no por competir. Estas son algunas de las actividades que disfruto con amigos y familia:"

volleyball_title:
  en: "Volleyball Vibes"
  es: "Vibras del Voleibol"

volleyball_text:
  en: |
    Nothing beats the feeling of sand between my toes and the sun on my back as we set up for a friendly match of beach volleyball. It's all about the teamwork, high-fives, and the occasional dive to make that epic save. Volleyball is my go-to for fun in the sun and the ultimate beach day activity.

    Beyond the beach, I bring my love for the game indoors with a team called Jaleón. Indoor volleyball is a different kind of fun, with fast-paced rallies and strategic plays. The energy of the indoor court, the sound of the whistle, and the camaraderie among team Jaleón members make each match an exciting challenge. Whether it's spiking over the net or making a critical save, playing with Jaleón adds a competitive edge while keeping it fun.
  es: |
    Nada supera la sensación de arena bajo los pies y el sol en la espalda mientras nos preparamos para un partido amistoso de voleibol de playa. Lo importante es el trabajo en equipo, los choques de manos y la zambullida ocasional para hacer esa salvada épica. El voleibol es mi actividad favorita para divertirme bajo el sol.

    Más allá de la playa, también lo practico en cancha cubierta con un equipo llamado Jaleón. El voleibol de sala es otra clase de diversión, con rallies rápidos y jugadas estratégicas. La energía de la cancha cubierta, el sonido del silbato y el buen rollo del equipo Jaleón hacen de cada partido un desafío emocionante.

wakeboarding_title:
  en: "Wakeboarding Wonders"
  es: "Wakeboard"

wakeboarding_text:
  en: "Strapping into my wakeboard is pure adrenaline. Gliding over the water, feeling the tug of the boat, and attempting those jumps and spins is my idea of a good time. Wakeboarding challenges me to improve while enjoying the water."
  es: "Atarme a mi wakeboard es pura adrenalina. Deslizarme sobre el agua, sentir el tirón del barco e intentar esos saltos y giros es mi idea de pasarlo bien. El wakeboard me reta a mejorar mientras disfruto del agua."

rollerblading_title:
  en: "Rollerblading Rendezvous"
  es: "Encuentros en Patines"

rollerblading_text:
  en: |
    Rollerblading through the park or along the boardwalk is my favorite way to unwind and explore. It's a smooth glide that combines fitness with leisure, allowing me to enjoy scenic views, breathe in the fresh air, and even stop for ice cream along the way. Exercise that doesn't feel like exercise.

    Here's to more time on the court, in the water, and on wheels!
  es: |
    Patinar por el parque o por el paseo marítimo es mi forma favorita de relajarme y explorar. Se desliza bien y combina ejercicio con ocio: buenas vistas, respirar aire fresco e incluso parar a tomar un helado en el camino. Ejercicio que no parece ejercicio.

    ¡Por más tiempo en la cancha, en el agua y sobre ruedas!
