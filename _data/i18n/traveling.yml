# Traveling page translations

title:
  en: "Global Wanderings"
  es: "Andanzas Globales"

intro:
  en: "Between conferences, research stays, and the occasional real holiday, I've been lucky to visit some great places. Here are the ones that stuck with me."
  es: "Entre conferencias, estancias de investigación y alguna que otra vacación de verdad, he tenido la suerte de visitar sitios muy buenos. Estos son los que se me quedaron grabados."

egypt_title:
  en: "Egypt: Land of Pharaohs"
  es: "Egipto: Tierra de Faraones"

egypt_text:
  en: "Egypt felt like walking through a history book. From the Pyramids of Giza to the Sphinx and the Egyptian Museum in Cairo, everything felt larger than life. Cruising down the Nile, the temples at Luxor and Karnak were a highlight. Hard to overstate how impressive they are in person."
  es: "Egipto fue como caminar dentro de un libro de historia. Desde las Pirámides de Giza hasta la Esfinge y el Museo Egipcio de El Cairo, todo parecía más grande de lo que imaginas. Navegando por el Nilo, los templos de Luxor y Karnak fueron lo más destacado. Difícil exagerar lo impresionantes que son en persona."

switzerland_title:
  en: "Switzerland: Alpine Majesty"
  es: "Suiza: Majestuosidad Alpina"

switzerland_text:
  en: "Switzerland is hard to beat for scenery: small villages, green valleys, and the Alps behind everything. Hiking the trails around Interlaken, walking along Lake Geneva, and the views from Shilthorn were some of the best. It's the kind of place that makes you want to stay."
  es: "Suiza es difícil de superar en paisajes: pueblos pequeños, valles verdes y los Alpes siempre de fondo. Recorrer los senderos de Interlaken, pasear por el Lago Lemán y las vistas desde el Shilthorn fueron de lo mejor. De esos sitios donde te apetece quedarte."

vancouver_title:
  en: "Vancouver: Urban Nature"
  es: "Vancouver: Naturaleza Urbana"

vancouver_text:
  en: "Vancouver mixes city and nature better than anywhere I've been. Strolling through Gastown, relaxing in Stanley Park, and the views from Grouse Mountain were highlights. The city's multicultural feel and proximity to places like the Capilano Suspension Bridge and Whistler made it easy to fill a week."
  es: "Vancouver mezcla ciudad y naturaleza mejor que cualquier otro sitio que haya visitado. Pasear por Gastown, descansar en Stanley Park y las vistas desde Grouse Mountain fueron lo mejor. El ambiente multicultural de la ciudad y su cercanía a sitios como el Puente Colgante de Capilano y Whistler daban para una semana sin problema."

italy_title:
  en: "Italy: Venice and Pisa Highlights"
  es: "Italia: Lo Mejor de Venecia y Pisa"

italy_text:
  en: |
    In Venice, the winding canals and old architecture are as good as advertised. A gondola ride through the Grand Canal gave a different view of the city, and the lively Piazza San Marco was worth the crowds.

    Pisa is smaller than you'd expect but the Leaning Tower in the Piazza dei Miracoli is striking in person. The Cathedral and Baptistery next to it are worth the visit too. You can see it all in a day, but it stays with you.
  es: |
    En Venecia, los sinuosos canales y la arquitectura antigua son tan buenos como dicen. Un paseo en góndola por el Gran Canal dio otra perspectiva de la ciudad, y la animada Piazza San Marco merecía la pena pese a las aglomeraciones.

    Pisa es más pequeña de lo que esperas, pero la Torre Inclinada en la Piazza dei Miracoli impresiona en persona. La Catedral y el Baptisterio al lado también merecen la visita. Se puede ver todo en un día, pero se te queda.

netherlands_title:
  en: "The Netherlands: Dutch Delights"
  es: "Países Bajos: Delicias Holandesas"

netherlands_text:
  en: "I spent a year based in the Netherlands for my research at Nikhef. Outside the lab, I got to know the country well: cycling through tulip fields and past windmills, exploring the canals of Amsterdam, and spending time in the museums with Van Gogh and Rembrandt. A great place to live and work."
  es: "Pasé un año en los Países Bajos por mi investigación en Nikhef. Fuera del laboratorio, fui conociendo bien el país: recorrer en bici campos de tulipanes y molinos, explorar los canales de Ámsterdam, y pasar tiempo en los museos con Van Gogh y Rembrandt. Un gran sitio para vivir y trabajar."

paris_title:
  en: "Paris: A City of Light and Love"
  es: "París: Ciudad de la Luz y el Amor"

paris_text:
  en: "Paris lives up to the hype. The Eiffel Tower, the Louvre, and the cafes along the Seine are everything you'd expect. But the best parts were the smaller corners: the streets of Montmartre, the neighbourhood markets, and just walking along the Champs-Élysées. Easy to see why people keep going back."
  es: "París cumple con las expectativas. La Torre Eiffel, el Louvre y los cafés a lo largo del Sena son todo lo que esperas. Pero lo mejor fueron los rincones más pequeños: las calles de Montmartre, los mercados de barrio, y simplemente pasear por los Campos Elíseos. Fácil entender por qué la gente vuelve."
